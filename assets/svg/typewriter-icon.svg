    <path d="M553 206L620 262L553 318" fill="none" stroke="#06B6D4" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M486 190L419 338" fill="none" stroke="#06B6D4" stroke-width="36" stroke-linecap="round"/>

