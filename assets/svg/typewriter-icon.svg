    <rect x="218" y="531" width="588" height="105" rx="52" fill="#111C4E"/>

    <!-- paper -->
    <path d="M265 92H681L795 205V668C795 702 768 730 734 730H265C231 730 204 702 204 668V153C204 119 231 92 265 92Z" fill="url(#paperGrad)" stroke="#C8D5E8" stroke-width="10"/>
