<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Typewriter code generator icon</title>
  <desc id="desc">A modern typewriter producing generated code.</desc>
  <defs>
    <linearGradient id="baseGrad" x1="180" y1="585" x2="850" y2="885" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#162A63"/>
      <stop offset="1" stop-color="#0B123A"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="260" y1="120" x2="750" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF2FF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0B123A" flood-opacity="0.16"/>
    </filter>
  </defs>
  
  <g filter="url(#softShadow)">
