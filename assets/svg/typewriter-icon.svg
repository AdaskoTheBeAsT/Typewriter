    <rect x="558" y="551" width="145" height="23" rx="11" fill="#94A3B8"/>
    <rect x="278" y="614" width="55" height="23" rx="11" fill="#94A3B8" opacity="0.45"/>
    <rect x="375" y="614" width="215" height="23" rx="11" fill="#94A3B8"/>

